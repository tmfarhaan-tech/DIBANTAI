<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIBANTAI | Diskusi Bareng dan Santai</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syne:wght@800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(15, 23, 42, 0.6);
            --accent-indigo: #6366f1;
            --accent-purple: #a855f7;
            --accent-cyan: #06b6d4;
            --danger: #f43f5e;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Animated Background Orbs */
        .orb-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(120px);
            opacity: 0.6;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            animation: move linear infinite;
        }

        .orb-1 { width: 400px; height: 400px; background: var(--accent-indigo); top: -10%; left: -10%; animation-duration: 20s; }
        .orb-2 { width: 500px; height: 500px; background: var(--accent-purple); bottom: -10%; right: -10%; animation-duration: 25s; }
        .orb-3 { width: 350px; height: 350px; background: var(--accent-cyan); top: 40%; left: 30%; animation-duration: 18s; }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(100px, 100px) scale(1.2); }
            66% { transform: translate(-50px, 200px) scale(0.8); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 800px;
            perspective: 1000px;
        }

        /* Premium Glass Card */
        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Neon Laser Scanline */
        .laser-line {
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), var(--accent-purple), transparent);
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: -2px;
            background: linear-gradient(to right, #fff, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--text-dim);
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        /* Topic Terminal Display */
        .topic-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin-bottom: 30px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .shaking {
            animation: shake 0.1s infinite;
            border-color: var(--accent-purple);
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            50% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, -1px) rotate(1deg); }
        }

        .category-badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .topic-text {
            font-size: 1.5rem;
            line-height: 1.4;
            font-weight: 500;
        }

        /* Buttons & Controls */
        .controls {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            cursor: pointer;
            border: none;
            border-radius: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            color: white;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-indigo), var(--accent-purple));
            font-size: 1.1rem;
            padding: 20px;
            box-shadow: 0 0 0 rgba(168, 85, 247, 0);
        }

        .btn-primary:hover {
            transform: scale(1.02);
            letter-spacing: 2px;
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Timer System */
        .timer-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }

        .timer-display {
            font-size: 3.5rem;
            font-family: 'Syne', sans-serif;
            text-align: center;
            margin: 10px 0;
            font-variant-numeric: tabular-nums;
        }

        .danger-zone {
            color: var(--danger);
            text-shadow: 0 0 20px var(--danger);
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        .presets {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .preset-btn {
            padding: 5px 12px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .timer-btns {
            display: flex;
            gap: 10px;
        }

        /* History Log */
        .history-section {
            margin-top: 40px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .history-section h3 {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 10px;
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            gap: 5px;
            animation: slideIn 0.
