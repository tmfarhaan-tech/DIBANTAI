<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIBANTAI - Diskusi Bareng dan Santai</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #22d3ee;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }

        .container { width: 100%; max-width: 800px; z-index: 1; }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        header h1 {
            font-size: 2.8rem; font-weight: 800;
            background: linear-gradient(to right, var(--accent), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .topic-display {
            min-height: 200px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; margin: 30px 0;
            padding: 30px; border-radius: 20px; transition: all 0.2s ease;
        }

        #topic-text { font-size: 1.6rem; line-height: 1.4; font-weight: 600; }

        .category-badge {
            padding: 6px 16px; border-radius: 50px; font-size: 0.7rem; font-weight: 700;
            background: rgba(99, 102, 241, 0.2); color: var(--accent); border: 1px solid rgba(34, 211, 238, 0.3);
            margin-bottom: 20px; text-transform: uppercase;
        }

        .btn-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

        button {
            cursor: pointer; border: none; border-radius: 12px; font-weight: 600;
            transition: all 0.2s ease; padding: 14px 24px;
        }

        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .btn-secondary { background: var(--glass-border); color: white; }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.2); }

        .timer-section { margin-top: 40px; padding-top: 30px; border-top: 1px solid var(--glass-border); }
        .timer-display { font-family: 'Monaco', monospace; font-size: 3.5rem; color: var(--accent); margin: 10px 0; }
        .preset-btn { background: transparent; border: 1px solid var(--glass-border); color: var(--text-muted); padding: 5px 12px; margin: 0 4px; }
        .preset-btn.active { border-color: var(--accent); color: var(--accent); }

        .history-section { margin-top: 40px; text-align: left; }
        .history-item { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .history-meta { font-size: 0.7rem; color: var(--text-muted); }
    </style>
</head>
<body>

    <div class="container">
        <main class="glass-card">
            <header>
                <h1>DIBANTAI</h1>
                <p>Diskusi Bareng dan Santai</p>
            </header>

            <div class="topic-display" id="display-container">
                <span class="category-badge" id="category-badge">Ready?</span>
                <p id="topic-text">Tekan tombol untuk mulai mengacak.</p>
            </div>

            <div class="btn-group">
                <button class="btn-primary" onclick="generateTopic()">ACAK TOPIK</button>
                <button class="btn-secondary" onclick="copyTopic()"><span id="copy-text">Salin</span></button>
            </div>

            <div class="timer-section">
                <div id="presets">
                    <button class="preset-btn" onclick="setTimer(60)">1m</button>
                    <button class="preset-btn active" onclick="setTimer(120)">2m</button>
                    <button class="preset-btn" onclick="setTimer(180)">3m</button>
                    <button class="preset-btn" onclick="setTimer(300)">5m</button>
                </div>
                <div class="timer-display" id="timer-val">02:00</div>
                <div class="btn-group">
                    <button class="btn-secondary" id="timer-toggle" onclick="toggleTimer()">Mulai</button>
                    <button class="btn-secondary" onclick="resetTimer()">Reset</button>
                </div>
            </div>

            <div class="history-section">
                <h3 style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 15px;">Riwayat Diskusi</h3>
                <div id="history-list"></div>
            </div>
        </main>
    </div>

    <script>
        const topics = [
            { cat: "Politics", text: "Efektivitas oposisi di parlemen dalam sistem presidensial dengan koalisi gemuk." },
            { cat: "Politics", text: "Digital Activism: Apakah 'clactivism' melemahkan substansi gerakan mahasiswa?" },
            { cat: "Politics", text: "Urgensi Presidential Threshold 20% dalam memperkuat sistem ketatanegaraan." },
            { cat: "Politics", text: "Netralitas ASN dan aparat dalam kontestasi Pilkada serentak." },
            { cat: "Economy", text: "Dampak kenaikan PPN 12% terhadap daya beli masyarakat kelas menengah." },
            { cat: "Economy", text: "Hilirisasi Nikel: Kedaulatan ekonomi vs gugatan WTO." },
            { cat: "Social", text: "Cancel Culture: Instrumen kontrol sosial atau penghakiman massa?" },
            { cat: "Social", text: "Komodifikasi kesehatan mental di media sosial." }
            // ... (tambahkan topik lainnya hingga 100 sesuai daftar sebelumnya)
        ];

        let timerSeconds = 120;
        let timerInterval = null;
        let history = JSON.parse(localStorage.getItem('dibantai_history')) || [];

        // AUDIO ASSETS
        const alarmSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
        const clickSound = new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3');
        const startSound = new Audio('https://www.soundjay.com/buttons/sounds/button-09.mp3');
        const shuffleTick = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
        const secondTick = new Audio('https://www.soundjay.com/clock/sounds/clock-ticking-2.mp3');

        function generateTopic() {
            const topicTxt = document.getElementById('topic-text');
            const badge = document.getElementById('category-badge');
            const container = document.getElementById('display-container');

            clickSound.currentTime = 0; clickSound.play();
            container.style.transform = "scale(0.98)";
            container.style.boxShadow = "0 0 40px rgba(34, 211, 238, 0.4)";

            let it = 0;
            const shuffle = setInterval(() => {
                topicTxt.innerText = topics[Math.floor(Math.random()*topics.length)].text;
                shuffleTick.currentTime = 0; shuffleTick.volume = 0.3; shuffleTick.play();
                it++;
                if(it > 12) {
                    clearInterval(shuffle);
                    const final = topics[Math.floor(Math.random()*topics.length)];
                    topicTxt.innerText = final.text;
                    badge.innerText = final.cat;
                    container.style.transform = "scale(1)";
                    container.style.boxShadow = "none";
                    startSound.play();
                    addToHistory(final);
                }
            }, 80);
        }

        function toggleTimer() {
            const btn = document.getElementById('timer-toggle');
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                btn.innerText = "Lanjut";
            } else {
                startSound.currentTime = 0; startSound.play(); // Suara saat "Mulai" diklik
                btn.innerText = "Pause";
                timerInterval = setInterval(() => {
                    if (timerSeconds > 0) {
                        timerSeconds--;
                        updateTimerDisplay();
                        secondTick.currentTime = 0; secondTick.volume = 0.5; secondTick.play(); // Detik berjalan
                    } else {
                        clearInterval(timerInterval);
                        timerInterval = null;
                        btn.innerText = "Mulai";
                        alarmSound.play(); // Alarm Habis
                        alert("Waktu Habis!");
                    }
                }, 1000);
            }
        }

        function setTimer(sec) {
            clickSound.currentTime = 0; clickSound.play();
            resetTimer();
            timerSeconds = sec;
            updateTimerDisplay();
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            document.getElementById('timer-toggle').innerText = "Mulai";
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            const m = Math.floor(timerSeconds/60).toString().padStart(2,'0');
            const s = (timerSeconds%60).toString().padStart(2,'0');
            document.getElementById('timer-val').innerText = `${m}:${s}`;
        }

        function addToHistory(t) {
            const time = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
            history.unshift({...t, time});
            if(history.length > 5) history.pop();
            localStorage.setItem('dibantai_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            document.getElementById('history-list').innerHTML = history.map(h => `
                <div class="history-item">
                    <div class="history-meta">${h.cat} • ${h.time}</div>
                    <div class="history-topic">${h.text}</div>
                </div>
            `).join('');
        }

        function copyTopic() {
            clickSound.currentTime = 0; clickSound.play();
            navigator.clipboard.writeText(document.getElementById('topic-text').innerText);
            const btn = document.getElementById('copy-text');
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = "Salin", 1500);
        }

        window.onload = renderHistory;
    </script>
</body>
</html>
