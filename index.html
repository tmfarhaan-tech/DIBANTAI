    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #22d3ee;
            --danger: #f43f5e;
            --bg-dark: #050505;
            --glass: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Moving Liquid Orbs Animation */
        .orb {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.35;
            animation: floatOrb 25s infinite alternate ease-in-out;
        }
        .orb-1 { background: var(--primary); top: -10%; left: -10%; }
        .orb-2 { background: var(--secondary); bottom: -10%; right: -10%; animation-delay: -7s; }
        .orb-3 { background: var(--accent); top: 40%; left: 50%; width: 300px; height: 300px; animation-delay: -12s; }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(80px, 60px) scale(1.2) rotate(180deg); }
            100% { transform: translate(-40px, 80px) scale(0.9) rotate(360deg); }
        }

        .container {
            width: 100%;
            max-width: 850px;
            z-index: 1;
        }

        /* Cyberpunk Card Framework */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 45px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Neon Top Scanline Laser */
        .glass-card::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--secondary), transparent);
            animation: scanLine 4s linear infinite;
        }

        @keyframes scanLine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 30%, var(--accent), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        header p {
            color: var(--text-muted);
            margin-bottom: 35px;
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Interactive Topic Screen Container */
        .topic-display {
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 35px;
            padding: 35px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Shake animation during active shuffle */
        .topic-display.shuffling {
            animation: screenShake 0.1s infinite;
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.2);
        }

        @keyframes screenShake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            25% { transform: translate(-1px, -1px) rotate(-0.5deg); }
            50% { transform: translate(-1px, 1px) rotate(0.5deg); }
            75% { transform: translate(1px, -1px) rotate(0deg); }
            100% { transform: translate(1px, 1px) rotate(0deg); }
        }

        .category-badge {
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(168, 85, 247, 0.15);
            color: var(--secondary);
            border: 1px solid rgba(168, 85, 247, 0.3);
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .category-badge.politics { color: var(--accent); background: rgba(34, 211, 238, 0.15); border-color: rgba(34, 211, 238, 0.3); }
        .category-badge.economy { color: #f59e0b; background: rgba(245, 158, 11, 0.15); border-color: rgba(245, 158, 11, 0.3); }
        .category-badge.social { color: #ec4899; background: rgba(236, 72, 153, 0.15); border-color: rgba(236, 72, 153, 0.3); }

        #topic-text {
            font-size: 1.6rem;
            line-height: 1.5;
            font-weight: 600;
            transition: opacity 0.1s ease;
        }

        /* Futuristic Interactive Buttons */
        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 16px 32px;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 8px 20px -6px rgba(99, 102, 241, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-primary:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 30px var(--primary);
            letter-spacing: 1.5px;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.04);
            color: white;
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--text-muted);
            transform: translateY(-2px);
        }

        /* High Intensity Timer Layout */
        .timer-section {
            margin-top: 45px;
            padding-top: 35px;
            border-top: 1px solid var(--glass-border);
        }

        .timer-display {
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 4rem;
            font-weight: 700;
            color: var(--accent);
            margin: 15px 0;
            text-shadow: 0 0 20px rgba(34, 211, 238, 0.3);
            letter-spacing: 2px;
            transition: color 0.3s ease;
        }

        .timer-display.danger-time {
            color: var(--danger);
            text-shadow: 0 0 25px rgba(244, 63, 94, 0.5);
            animation: pulseDanger 0.5s infinite alternate;
        }

        @keyframes pulseDanger {
            0% { transform: scale(1); }
            100% { transform: scale(1.03); }
        }

        .preset-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 6px 14px;
            font-size: 0.8rem;
            margin: 0 4px;
            border-radius: 8px;
        }

        .preset-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(34, 211, 238, 0.05);
        }

        /* History Log Design */
        .history-section {
            margin-top: 45px;
            text-align: left;
        }

        .history-section h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            padding: 18px;
            border-radius: 16px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: all 0.3s ease;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateX(5px);
        }

        .history-meta {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        .history-topic {
            font-size: 0.95rem;
            line-height: 1.4;
            color: #e2e8f0;
        }

        @media (max-width: 600px) {
            .glass-card { padding: 30px 20px; }
            header h1 { font-size: 2.3rem; }
            #topic-text { font-size: 1.25rem; }
            .timer-display { font-size: 3rem; }
        }
    </style>
</head>

            badge.className = "category-badge";

                topicTxt.style.opacity = iterations % 2 === 0 ? "0.4" : "1";

                shuffleTick.volume = 0.3;
                shuffleTick.play();

                iterations++;

                if (iterations > 15) {
                    clearInterval(shuffle);
                    const final = topics[Math.floor(Math.random() * topics.length)];
                    
                    // Render Hasil Final
                    topicTxt.innerText = final.text;
                    badge.innerText = final.cat;
                    badge.classList.add(final.cat.toLowerCase());
                    
                    // Matikan Animasi Getar
                    topicTxt.style.opacity = "1";
                    container.classList.remove('shuffling');
                    
                    startSound.currentTime = 0;
                    startSound.play();
                    
                    addToHistory(final);
                }
            }, 75);
        }

        function toggleTimer() {
            const btn = document.getElementById('timer-toggle');
            const clock = document.getElementById('timer-val');
            
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                btn.innerText = "Lanjut";
                clickSound.play();
            } else {
                startSound.currentTime = 0;
                startSound.play();
                btn.innerText = "Pause";
                
                timerInterval = setInterval(() => {
                    if (timerSeconds > 0) {
                        timerSeconds--;
                        updateTimerDisplay();
                        
                        // Bunyi detak konstan setiap detik berjalan
                        secondTick.currentTime = 0;
                        secondTick.volume = 0.4;
                        secondTick.play();

                        // Beri sinyal merah jika waktu kritis (di bawah 15 detik)
                        if(timerSeconds <= 15) {
                            clock.classList.add('danger-time');
                        }
                    } else {
                        clearInterval(timerInterval);
                        timerInterval = null;
                        clock.classList.remove('danger-time');
                        btn.innerText = "Mulai";
                        alarmSound.play();
                        alert("Waktu Diskusi Selesai! Pertahankan Argumen Anda.");
                    }
                }, 1000);
            }
        }

        function setTimer(sec) {
            clickSound.currentTime = 0; clickSound.play();
            resetTimer();
            timerSeconds = sec;
            updateTimerDisplay();
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            document.getElementById('timer-val').classList.remove('danger-time');
            document.getElementById('timer-toggle').innerText = "Mulai";
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            const m = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
            const s = (timerSeconds % 60).toString().padStart(2, '0');
            document.getElementById('timer-val').innerText = `${m}:${s}`;
        }

        function addToHistory(t) {
            const time = new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute: '2-digit'});
            history.unshift({...t, time});
            if(history.length > 5) history.pop();
            localStorage.setItem('dibantai_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            document.getElementById('history-list').innerHTML = history.map(h => `
                <div class="history-item">
                    <div class="history-meta">
                        <span style="font-weight:700; text-transform:uppercase; letter-spacing:1px;">${h.cat}</span>
                        <span>${h.time}</span>
                    </div>
                    <div class="history-topic">${h.text}</div>
                </div>
            `).join('');
        }

        function copyTopic() {
            clickSound.currentTime = 0;
            clickSound.play();
            navigator.clipboard.writeText(document.getElementById('topic-text').innerText);
            const btn = document.getElementById('copy-text');
            btn.innerText = "Tersalin!";
            setTimeout(() => btn.innerText = "Salin Isu", 1500);
        }

        window.onload = renderHistory;
    </script>
</body>
</html>
